<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Diktiergerät</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diktiergerät">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" id="themeColor" content="#0a0a0f">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='115' fill='%230a0a0f'/%3E%3Crect x='228' y='140' width='56' height='160' rx='28' fill='%23ff3c5a'/%3E%3Ccircle cx='256' cy='220' r='80' fill='none' stroke='%23ff3c5a' stroke-width='28'/%3E%3Cpath d='M160 260 Q160 360 256 360 Q352 360 352 260' fill='none' stroke='%23ff3c5a' stroke-width='28' stroke-linecap='round'/%3E%3Crect x='228' y='360' width='56' height='60' fill='%23ff3c5a' rx='8'/%3E%3Crect x='180' y='410' width='152' height='28' rx='14' fill='%23ff3c5a'/%3E%3C/svg%3E">
<script>
const manifest={name:"Diktiergerät",short_name:"Diktier",start_url:"./",display:"standalone",background_color:"#0a0a0f",theme_color:"#0a0a0f",orientation:"portrait",icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='115' fill='%230a0a0f'/%3E%3Crect x='228' y='140' width='56' height='160' rx='28' fill='%23ff3c5a'/%3E%3Ccircle cx='256' cy='220' r='80' fill='none' stroke='%23ff3c5a' stroke-width='28'/%3E%3Cpath d='M160 260 Q160 360 256 360 Q352 360 352 260' fill='none' stroke='%23ff3c5a' stroke-width='28' stroke-linecap='round'/%3E%3Crect x='228' y='360' width='56' height='60' fill='%23ff3c5a' rx='8'/%3E%3Crect x='180' y='410' width='152' height='28' rx='14' fill='%23ff3c5a'/%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}]};
const b=new Blob([JSON.stringify(manifest)],{type:'application/json'});
document.write('<link rel="manifest" href="'+URL.createObjectURL(b)+'">');
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ── Dark Theme (default) ── */
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3d;
  --text: #e8e8f0;
  --muted: #666680;
  --rec: #ff3c5a;
  --rec-glow: rgba(255,60,90,0.3);
  --ok: #00e5a0;
  --ok-glow: rgba(0,229,160,0.25);
  --accent: #7b5cff;
  --shadow: rgba(0,0,0,0.4);
}
/* ── Light Theme ── */
body.light {
  --bg: #f0f0f5;
  --surface: #ffffff;
  --surface2: #e8e8f0;
  --border: #d0d0e0;
  --text: #1a1a2e;
  --muted: #8888a0;
  --rec: #e8002a;
  --rec-glow: rgba(232,0,42,0.2);
  --ok: #007a55;
  --ok-glow: rgba(0,122,85,0.2);
  --accent: #5b3fd4;
  --shadow: rgba(0,0,0,0.1);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(–bg);color:var(–text);font-family:‘DM Mono’,monospace;transition:background 0.3s,color 0.3s;}
body::before{content:’’;position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(123,92,255,0.08),transparent);pointer-events:none;z-index:0;}
body.light::before{background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(91,63,212,0.06),transparent);}
.app{max-width:480px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1;}

/* Header */
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.logo{font-family:‘Syne’,sans-serif;font-weight:800;font-size:18px;}
.logo span{color:var(–rec);}
.header-right{display:flex;align-items:center;gap:8px;}
.chip{display:flex;align-items:center;gap:6px;background:var(–surface);border:1px solid var(–border);border-radius:20px;padding:5px 12px;font-size:11px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(–muted);transition:all 0.3s;}
.dot.rec{background:var(–rec);box-shadow:0 0 8px var(–rec-glow);animation:pulse 1s infinite;}
.dot.ok{background:var(–ok);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Theme Toggle */
.theme-btn{background:var(–surface);border:1px solid var(–border);border-radius:20px;padding:5px 10px;cursor:pointer;font-size:16px;line-height:1;transition:all 0.2s;}
.theme-btn:hover{border-color:var(–accent);}

/* Mic Banner */
.mic-banner{background:rgba(123,92,255,0.1);border:1px solid rgba(123,92,255,0.35);border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.mic-banner.hidden{display:none;}
.mic-banner-txt{flex:1;font-size:12px;line-height:1.5;}
.mic-banner-txt b{color:var(–accent);}
.btn-mic{background:var(–accent);border:none;border-radius:10px;padding:10px 14px;color:#fff;font-family:‘DM Mono’,monospace;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}

/* Card */
.card{background:var(–surface);border:1px solid var(–border);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px var(–shadow);}
.lbl{font-size:10px;font-weight:500;letter-spacing:0.12em;color:var(–muted);margin-bottom:10px;text-transform:uppercase;}
.row{display:flex;gap:8px;}
.api-input{flex:1;background:var(–surface2);border:1px solid var(–border);border-radius:10px;padding:10px 14px;color:var(–text);font-family:‘DM Mono’,monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
.api-input:focus{border-color:var(–accent);}
.btn-sm{background:var(–accent);border:none;border-radius:10px;padding:10px 14px;color:#fff;font-family:‘DM Mono’,monospace;font-size:12px;cursor:pointer;white-space:nowrap;transition:opacity 0.2s;}
.btn-sm:hover{opacity:0.85;}
.btn-sm.saved{background:var(–ok);color:#fff;}

/* Segments collapsible */
.seg-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;-webkit-user-select:none;}
.seg-hdr-left{display:flex;align-items:center;gap:8px;}
.seg-toggle{font-size:12px;color:var(–muted);transition:transform 0.25s;}
.seg-toggle.open{transform:rotate(180deg);}
.seg-cnt{font-size:11px;color:var(–muted);}
.seg-body{overflow:hidden;transition:max-height 0.3s ease,opacity 0.3s ease;max-height:0;opacity:0;}
.seg-body.open{max-height:600px;opacity:1;}
.seg-list{display:flex;flex-direction:column;gap:8px;padding-top:12px;}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70px;gap:8px;color:var(–muted);font-size:12px;}
.empty-ico{font-size:22px;opacity:0.4;}

/* Each segment as collapsible accordion item */
.seg-item{background:var(–surface2);border:1px solid var(–border);border-radius:10px;overflow:hidden;animation:slideIn 0.25s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.seg-item-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.seg-num{font-size:10px;color:var(–accent);font-weight:500;min-width:24px;}
.seg-preview{font-size:12px;color:var(–muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.seg-chevron{font-size:11px;color:var(–muted);transition:transform 0.2s;flex-shrink:0;}
.seg-chevron.open{transform:rotate(180deg);}
.seg-item-body{max-height:0;overflow:hidden;transition:max-height 0.25s ease;}
.seg-item-body.open{max-height:400px;}
.seg-item-content{padding:0 14px 12px;display:flex;flex-direction:column;gap:8px;}
.seg-txt{font-size:13px;line-height:1.6;color:var(–text);}
.seg-actions{display:flex;gap:6px;}
.seg-del{background:none;border:1px solid var(–border);border-radius:7px;color:var(–muted);cursor:pointer;font-size:11px;padding:5px 10px;font-family:‘DM Mono’,monospace;transition:all 0.2s;}
.seg-del:hover{border-color:var(–rec);color:var(–rec);}
.seg-copy{background:none;border:1px solid var(–border);border-radius:7px;color:var(–muted);cursor:pointer;font-size:11px;padding:5px 10px;font-family:‘DM Mono’,monospace;transition:all 0.2s;}
.seg-copy:hover{border-color:var(–accent);color:var(–accent);}

/* Live box */
.live-box{background:rgba(123,92,255,0.08);border:1px solid rgba(123,92,255,0.25);border-radius:10px;padding:12px 14px;font-size:13px;color:var(–muted);line-height:1.5;margin-bottom:12px;display:none;min-height:44px;}
.live-box.active{display:block;}
.live-interim{opacity:0.5;}

/* Rec bar */
.rec-bar{background:rgba(255,60,90,0.08);border:1px solid rgba(255,60,90,0.25);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;opacity:0;transform:translateY(8px);transition:all 0.2s;}
.rec-bar.on{opacity:1;transform:translateY(0);}
.wave{display:flex;gap:3px;align-items:center;}
.wb{width:3px;border-radius:2px;background:var(–rec);animation:wv 0.8s ease-in-out infinite;}
.wb:nth-child(1){height:14px;}.wb:nth-child(2){height:20px;animation-delay:.1s;}.wb:nth-child(3){height:26px;animation-delay:.2s;}.wb:nth-child(4){height:20px;animation-delay:.3s;}.wb:nth-child(5){height:14px;animation-delay:.4s;}
@keyframes wv{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.35)}}
.rec-lbl{flex:1;font-size:12px;color:var(–rec);}
.rec-time{font-size:13px;font-weight:500;color:var(–rec);font-variant-numeric:tabular-nums;}

/* PTT */
.ptt-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin:4px 0 16px;}
.ptt-hint{font-size:11px;color:var(–muted);letter-spacing:0.05em;}
.ptt{width:110px;height:110px;border-radius:50%;background:var(–surface2);border:2px solid var(–border);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(–text);font-family:‘DM Mono’,monospace;font-size:11px;font-weight:500;letter-spacing:0.05em;transition:all 0.15s;user-select:none;-webkit-user-select:none;touch-action:none;box-shadow:0 4px 16px var(–shadow);}
.ptt.on{background:var(–rec);border-color:var(–rec);box-shadow:0 0 0 8px var(–rec-glow),0 0 30px var(–rec-glow);color:#fff;}
.ptt.disabled{opacity:0.35;pointer-events:none;}
.ptt-ico{font-size:30px;}

/* Actions */
.actions{display:flex;gap:8px;margin-bottom:12px;}
.btn-finish{flex:1;background:var(–ok);border:none;border-radius:12px;padding:14px;color:#fff;font-family:‘DM Mono’,monospace;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;}
body.light .btn-finish{color:#fff;}
.btn-finish:disabled{background:var(–surface2);color:var(–muted);cursor:not-allowed;}
.btn-finish:not(:disabled):hover{box-shadow:0 0 20px var(–ok-glow);}
.btn-clear{background:var(–surface);border:1px solid var(–border);border-radius:12px;padding:14px 18px;color:var(–muted);font-size:16px;cursor:pointer;transition:all 0.2s;}
.btn-clear:hover{border-color:var(–rec);color:var(–rec);}

/* Result */
.hidden{display:none!important;}
.res-text{background:var(–surface2);border:1px solid var(–border);border-radius:10px;padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;margin-top:10px;max-height:220px;overflow-y:auto;}
.res-acts{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.res-btn{background:var(–surface2);border:1px solid var(–border);border-radius:8px;padding:8px 12px;color:var(–text);font-family:‘DM Mono’,monospace;font-size:11px;cursor:pointer;transition:all 0.2s;}
.res-btn:hover{border-color:var(–accent);color:var(–accent);}
.lang-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.lang-btn{background:var(–surface2);border:1px solid var(–border);border-radius:8px;padding:7px 10px;color:var(–text);font-family:‘DM Mono’,monospace;font-size:11px;cursor:pointer;transition:all 0.2s;}
.lang-btn:hover{border-color:var(–accent);color:var(–accent);}
.lang-btn.active{background:var(–accent);border-color:var(–accent);color:#fff;}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(–surface);border:1px solid var(–border);border-radius:40px;padding:10px 20px;font-size:12px;font-weight:500;z-index:999;transition:transform 0.3s;white-space:nowrap;box-shadow:0 4px 20px var(–shadow);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(–ok);color:var(–ok);}
.toast.err{border-color:var(–rec);color:var(–rec);}
</style>

</head>
<body>
<div class="app">
  <header>
    <div class="logo">⬤ <span>Diktier</span>gerät</div>
    <div class="header-right">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Hell/Dunkel">🌙</button>
      <div class="chip"><div class="dot" id="dot"></div><span id="stxt">Starte…</span></div>
    </div>
  </header>

  <!-- Mikrofon Banner -->

  <div class="mic-banner" id="micBanner">
    <div class="mic-banner-txt"><b>Mikrofon-Zugriff erforderlich</b><br>Einmalig freigeben – danach kein Nachfragen mehr.</div>
    <button class="btn-mic" onclick="requestMic()">🎤 Erlauben</button>
  </div>

  <!-- API Key -->

  <div class="card">
    <div class="lbl">Anthropic API-Schlüssel</div>
    <div class="row">
      <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-...">
      <button class="btn-sm" id="saveBtn" onclick="saveKey()">Speichern</button>
    </div>
  </div>

  <!-- Segments collapsible card -->

  <div class="card" id="segCard">
    <div class="seg-hdr" onclick="toggleSegBody()">
      <div class="seg-hdr-left">
        <div class="lbl" style="margin:0">Aufnahme-Bausteine</div>
        <div class="seg-cnt" id="segCnt">0</div>
      </div>
      <span class="seg-toggle" id="segToggle">▼</span>
    </div>
    <div class="seg-body" id="segBody">
      <div class="seg-list" id="segList">
        <div class="empty"><div class="empty-ico">🎙</div><span>Noch keine Bausteine</span></div>
      </div>
    </div>
  </div>

  <!-- Live preview -->

  <div class="live-box" id="liveBox">
    <span id="liveFinal"></span><span class="live-interim" id="liveInterim"></span>
  </div>

  <!-- Rec bar -->

  <div class="rec-bar" id="recBar">
    <div class="wave"><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div></div>
    <div class="rec-lbl">Aufnahme läuft…</div>
    <div class="rec-time" id="recTime">0:00</div>
  </div>

  <!-- PTT -->

  <div class="ptt-wrap">
    <div class="ptt-hint">GEDRÜCKT HALTEN ZUM AUFNEHMEN</div>
    <button class="ptt disabled" id="ptt"
      onmousedown="startRec(event)" onmouseup="stopRec(event)" onmouseleave="stopRec(event)"
      ontouchstart="startRec(event)" ontouchend="stopRec(event)" ontouchcancel="stopRec(event)">
      <span class="ptt-ico">🎤</span>
      <span id="pttLbl">WARTEN</span>
    </button>
  </div>

  <!-- Actions -->

  <div class="actions">
    <button class="btn-finish" id="finBtn" onclick="finish()" disabled>✦ Fertigstellen & Korrigieren</button>
    <button class="btn-clear" onclick="clearAll()" title="Alles löschen">✕</button>
  </div>

  <!-- Result -->

  <div class="card hidden" id="resCard">
    <div class="lbl">Korrigierter Text</div>
    <div class="res-text" id="resText"></div>
    <div class="res-acts">
      <button class="res-btn" onclick="copyText()">📋 Kopieren</button>
      <button class="res-btn" onclick="doMail()">✉️ E-Mail</button>
      <button class="res-btn" onclick="doTxt()">📝 TXT</button>
    </div>
    <div class="lbl" style="margin-top:14px">Übersetzen</div>
    <div class="lang-grid">
      <button class="lang-btn" onclick="doTranslate('Englisch',this)">🇬🇧 EN</button>
      <button class="lang-btn" onclick="doTranslate('Französisch',this)">🇫🇷 FR</button>
      <button class="lang-btn" onclick="doTranslate('Spanisch',this)">🇪🇸 ES</button>
      <button class="lang-btn" onclick="doTranslate('Italienisch',this)">🇮🇹 IT</button>
      <button class="lang-btn" onclick="doTranslate('Türkisch',this)">🇹🇷 TR</button>
      <button class="lang-btn" onclick="doTranslate('Arabisch',this)">🇸🇦 AR</button>
      <button class="lang-btn" onclick="doTranslate('Japanisch',this)">🇯🇵 JA</button>
      <button class="lang-btn" onclick="doTranslate('Chinesisch',this)">🇨🇳 ZH</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────
let segs = [];
let isRec = false;
let apiKey = '';
let corrected = '';
let recognition = null;
let accFinals = '';
let timerInt = null;
let timerSecs = 0;
let micStream = null;
let micGranted = false;
let segBodyOpen = false;
let openSegIndex = -1;
let isDark = true;

// ── Init ───────────────────────────────────────────────────
(function(){
  // Theme
  const savedTheme = localStorage.getItem('dk_theme');
  if(savedTheme === 'light'){ applyTheme('light'); }

  // API key
  const k = localStorage.getItem('dk_api');
  if(k){ apiKey=k; document.getElementById('apiKey').value=k; }

  // Speech API check
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('micBanner').innerHTML='<div class="mic-banner-txt" style="color:var(--rec)">⚠️ Bitte <b>Google Chrome</b> oder <b>Safari</b> auf iOS verwenden.</div>';
    return;
  }

  // iOS Safari: permissions API nicht verfügbar, immer Banner zeigen
  // Andere Browser: prüfen ob schon granted
  if(navigator.permissions){
    navigator.permissions.query({name:'microphone'}).then(r=>{
      if(r.state==='granted') acquireMic(true);
      // else: Banner bleibt sichtbar
    }).catch(()=>{ /* Safari wirft hier – Banner bleibt */ });
  }
  // Auf iOS (kein permissions API) bleibt Banner immer bis User tippt
})();

// ── Theme ──────────────────────────────────────────────────
function toggleTheme(){
  applyTheme(isDark ? 'light' : 'dark');
  localStorage.setItem('dk_theme', isDark ? 'dark' : 'light');
}
function applyTheme(theme){
  if(theme==='light'){
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent='☀️';
    document.getElementById('themeColor').content='#f0f0f5';
    isDark=false;
  } else {
    document.body.classList.remove('light');
    document.getElementById('themeBtn').textContent='🌙';
    document.getElementById('themeColor').content='#0a0a0f';
    isDark=true;
  }
}

// ── Segments Toggle ────────────────────────────────────────
function toggleSegBody(){
  segBodyOpen = !segBodyOpen;
  document.getElementById('segBody').classList.toggle('open', segBodyOpen);
  document.getElementById('segToggle').classList.toggle('open', segBodyOpen);
}

function toggleSegItem(i){
  openSegIndex = (openSegIndex === i) ? -1 : i;
  renderSegs();
  // Re-open body if closed
  if(!segBodyOpen && openSegIndex >= 0){
    segBodyOpen = true;
    document.getElementById('segBody').classList.add('open');
    document.getElementById('segToggle').classList.add('open');
  }
}

// ── Mikrofon ───────────────────────────────────────────────
function requestMic(){
  document.getElementById('micBanner').querySelector('.btn-mic').textContent='⏳';
  acquireMic(false);
}

async function acquireMic(silent){
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    micGranted = true;
    document.getElementById('micBanner').classList.add('hidden');
    document.getElementById('ptt').classList.remove('disabled');
    document.getElementById('pttLbl').textContent='HALTEN';
    setStatus('ok','Bereit');
    if(!silent) toast('✓ Mikrofon bereit','ok');
  } catch(err){
    document.getElementById('micBanner').querySelector('.btn-mic').textContent='🎤 Erlauben';
    toast('Mikrofon verweigert – bitte in Einstellungen erlauben','err');
  }
}

// ── API Key ────────────────────────────────────────────────
function saveKey(){
  const v=document.getElementById('apiKey').value.trim();
  if(!v){toast('Kein Schlüssel eingegeben','err');return;}
  apiKey=v; localStorage.setItem('dk_api',v);
  const b=document.getElementById('saveBtn');
  b.textContent='✓ OK'; b.classList.add('saved');
  setTimeout(()=>{b.textContent='Speichern';b.classList.remove('saved');},2000);
  toast('Gespeichert','ok');
}

// ── Recording ──────────────────────────────────────────────
function startRec(e){
  e.preventDefault();
  if(isRec||!micGranted) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;

  recognition=new SR();
  recognition.lang='de-DE';
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.maxAlternatives=1;
  accFinals='';

  recognition.onresult=function(e){
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) accFinals+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    document.getElementById('liveFinal').textContent=accFinals;
    document.getElementById('liveInterim').textContent=interim?' '+interim:'';
  };

  recognition.onerror=function(ev){
    if(ev.error==='not-allowed'){
      micGranted=false;
      document.getElementById('micBanner').classList.remove('hidden');
      document.getElementById('ptt').classList.add('disabled');
      toast('Mikrofon-Zugriff verloren','err');
      resetUI(); isRec=false;
    } else if(ev.error!=='no-speech'&&ev.error!=='aborted'){
      toast('Fehler: '+ev.error,'err');
    }
  };

  recognition.onend=function(){
    if(!isRec){ finalizeSeg(); }
    else { try{ recognition.start(); }catch(e){} }
  };

  try{ recognition.start(); }catch(e){ toast('Start fehlgeschlagen','err'); return; }

  isRec=true;
  document.getElementById('ptt').classList.add('on');
  document.getElementById('pttLbl').textContent='STOP';
  document.getElementById('recBar').classList.add('on');
  document.getElementById('liveBox').classList.add('active');
  document.getElementById('liveFinal').textContent='';
  document.getElementById('liveInterim').textContent='';
  setStatus('rec','REC');
  timerSecs=0;
  document.getElementById('recTime').textContent='0:00';
  timerInt=setInterval(()=>{
    timerSecs++;
    const m=Math.floor(timerSecs/60),s=timerSecs%60;
    document.getElementById('recTime').textContent=`${m}:${String(s).padStart(2,'0')}`;
  },1000);
}

function stopRec(e){
  e.preventDefault();
  if(!isRec) return;
  isRec=false; clearInterval(timerInt);
  resetUI(); setStatus('','Verarbeite…');
  try{ recognition.stop(); }catch(e){ finalizeSeg(); }
}

function resetUI(){
  document.getElementById('ptt').classList.remove('on');
  document.getElementById('pttLbl').textContent='HALTEN';
  document.getElementById('recBar').classList.remove('on');
}

function finalizeSeg(){
  const text=accFinals.trim();
  document.getElementById('liveBox').classList.remove('active');
  document.getElementById('liveFinal').textContent='';
  document.getElementById('liveInterim').textContent='';

  if(text.length>1){
    segs.push(text);
    // Auto-open segment list and show new segment expanded
    openSegIndex=segs.length-1;
    segBodyOpen=true;
    renderSegs();
    document.getElementById('segBody').classList.add('open');
    document.getElementById('segToggle').classList.add('open');
    document.getElementById('finBtn').disabled=false;
    toast(`✓ Baustein ${segs.length} gespeichert`,'ok');
    setStatus('ok','Bereit');
  } else {
    toast('Nichts erkannt – bitte nochmal','err');
    setStatus('','Bereit');
  }
  accFinals=''; recognition=null;
}

// ── Render Segments ────────────────────────────────────────
function renderSegs(){
  const l=document.getElementById('segList');
  l.innerHTML='';
  document.getElementById('segCnt').textContent=segs.length;

  if(!segs.length){
    l.innerHTML='<div class="empty"><div class="empty-ico">🎙</div><span>Noch keine Bausteine</span></div>';
    return;
  }

  segs.forEach((t,i)=>{
    const isOpen=(openSegIndex===i);
    const preview=t.length>40?t.substring(0,40)+'…':t;
    const el=document.createElement('div');
    el.className='seg-item';
    el.innerHTML=`
      <div class="seg-item-hdr" onclick="toggleSegItem(${i})">
        <div class="seg-num">#${i+1}</div>
        <div class="seg-preview">${esc(preview)}</div>
        <span class="seg-chevron${isOpen?' open':''}">▼</span>
      </div>
      <div class="seg-item-body${isOpen?' open':''}">
        <div class="seg-item-content">
          <div class="seg-txt">${esc(t)}</div>
          <div class="seg-actions">
            <button class="seg-copy" onclick="copySegment(${i})">📋 Kopieren</button>
            <button class="seg-del" onclick="delSeg(${i})">✕ Löschen</button>
          </div>
        </div>
      </div>`;
    l.appendChild(el);
  });
}

function copySegment(i){
  navigator.clipboard.writeText(segs[i]).then(()=>toast('✓ Kopiert','ok'));
}

function delSeg(i){
  segs.splice(i,1);
  if(openSegIndex>=segs.length) openSegIndex=segs.length-1;
  renderSegs();
  if(!segs.length) document.getElementById('finBtn').disabled=true;
}

// ── Finish ─────────────────────────────────────────────────
async function finish(){
  if(!segs.length||!apiKey) return;
  const combined=segs.join(' ');
  const btn=document.getElementById('finBtn');
  btn.disabled=true; btn.textContent='⏳ Korrigiere…';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,
        messages:[{role:'user',content:`Korrigiere diesen diktierten deutschen Text grammatikalisch und rechtschreibtechnisch. Behalte Inhalt und Stil bei. Gib NUR den korrigierten Text zurück:\n\n${combined}`}]})
    });
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+r.status);}
    const d=await r.json();
    corrected=d.content?.[0]?.text?.trim()||combined;
    document.getElementById('resText').textContent=corrected;
    document.getElementById('resCard').classList.remove('hidden');
    document.getElementById('resCard').scrollIntoView({behavior:'smooth',block:'start'});
    toast('✓ Text korrigiert','ok');
  }catch(err){toast('Fehler: '+err.message,'err');console.error(err);}
  btn.disabled=false; btn.textContent='✦ Fertigstellen & Korrigieren';
}

// ── Translate ──────────────────────────────────────────────
async function doTranslate(lang,btn){
  if(!corrected) return;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const orig=btn.textContent; btn.textContent='⏳';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,
        messages:[{role:'user',content:`Übersetze ins ${lang}. Nur die Übersetzung:\n\n${corrected}`}]})
    });
    const d=await r.json();
    document.getElementById('resText').textContent=d.content?.[0]?.text?.trim()||'';
    toast('✓ '+lang,'ok');
  }catch{toast('Übersetzung fehlgeschlagen','err');}
  btn.textContent=orig;
}

// ── Helpers ────────────────────────────────────────────────
function clearAll(){
  segs=[];corrected='';openSegIndex=-1;segBodyOpen=false;
  renderSegs();
  document.getElementById('segBody').classList.remove('open');
  document.getElementById('segToggle').classList.remove('open');
  document.getElementById('finBtn').disabled=true;
  document.getElementById('resCard').classList.add('hidden');
  document.getElementById('resText').textContent='';
  setStatus('','Bereit');
}
function copyText(){navigator.clipboard.writeText(document.getElementById('resText').textContent).then(()=>toast('✓ Kopiert','ok'));}
function doMail(){window.location.href='mailto:?subject=Diktat&body='+encodeURIComponent(document.getElementById('resText').textContent);}
function doTxt(){
  const a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(document.getElementById('resText').textContent);
  a.download='diktat.txt';a.click();
}
function setStatus(type,text){
  document.getElementById('dot').className='dot'+(type?' '+type:'');
  document.getElementById('stxt').textContent=text;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let toastT;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(type?' '+type:'');
  clearTimeout(toastT);toastT=setTimeout(()=>{el.className='toast';},3000);
}
</script>
